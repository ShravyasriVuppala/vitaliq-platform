spring:
  # ─── Application Name ─────────────────────────────────────
  application:
    name: VitalIQ

  # ─── PostgreSQL Configuration ────────────────────────────
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # ─── JPA/Hibernate Configuration ─────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ─── Kafka Configuration ──────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      acks: 0
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: vitaliq-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

  # ─── Elasticsearch Configuration ──────────────────────────
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS}

  # ─── SQL file  ──────────────────────────
  sql:
    init:
      mode: always


# AI provider configuration
ai:
  provider: ${AI_PROVIDER}        # change to switch providers

# ─── OpenAI Configuration ─────────────────────────────────
openai:
  model: ${OPENAI_MODEL}
  max-tokens: ${OPENAI_MAX_TOKENS}

# ─── Anthropic Configuration ─────────────────────────────────
anthropic:
  model: ${ANTHROPIC_MODEL}
  max-tokens: ${ANTHROPIC_MAX_TOKENS}
  # api-key NOT here — SDK reads ANTHROPIC_API_KEY from environment via fromEnv()

# ─── Server Configuration ─────────────────────────────────
server:
  port: 8080

# ─── Logging Configuration ────────────────────────────────
logging:
  level:
    com.vitaliq: DEBUG
    org.springframework: INFO
    org.apache.kafka: WARN

# ─── JWT Configuration ────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION}
    refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION}
